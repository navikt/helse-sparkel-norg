apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: sparkel-norg
  namespace: tbd
  labels:
    team: tbd
spec:
  image: {{image}}
  port: 8080
  liveness:
    path: isalive
    initialDelay: 5
  readiness:
    path: isready
    initialDelay: 5
  preStopHook:
    http:
      path: /stop
  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
    logging:
      destinations:
        - id: elastic
        - id: loki
  resources:
    limits:
      cpu: 2000m
      memory: 1Gi
    requests:
      cpu: 50m
      memory: 320Mi
  replicas:
    min: 2
    max: 8
    cpuThresholdPercentage: 400
  strategy:
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 2
  kafka:
    pool: nav-prod
  azure:
    application:
      enabled: true
  prometheus:
    enabled: true
    path: /metrics
  webproxy: true
  vault:
    enabled: true
  env:
    - name: KAFKA_CONSUMER_GROUP_ID
      value: tbd-sparkel-norg-v1
    - name: KAFKA_RAPID_TOPIC
      value: tbd.rapid.v1
  accessPolicy:
    outbound:
      rules:
        - application: logging
          namespace: nais-system
        - application: speed-api
          namespace: tbd
        - application: norg2
          namespace: org
